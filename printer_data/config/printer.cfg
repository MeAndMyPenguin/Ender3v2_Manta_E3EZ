[include mainsail.cfg]
[include shell_command.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
[include ebb36.cfg]
#[include input_shaper_adxl.cfg]

########################
#----------MCU----------
########################

[mcu]
canbus_uuid: b89c146b52b1
canbus_interface: can0

[temperature_sensor Manta_E3EZ]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 100

[temperature_sensor CB2]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[controller_fan Electronics_Fan]
pin: PA8
max_power: 1.0
shutdown_speed: 1.0
cycle_time: 0.010
fan_speed: 1.0
heater:
stepper: stepper_x, stepper_y, stepper_z

###############################
#----------KINEMATICS----------
###############################

[printer]
kinematics: corexz
max_velocity: 500
max_accel: 3000
max_z_velocity: 100
max_z_accel: 1000
minimum_cruise_ratio: 0.50
square_corner_velocity: 5.0

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 47.4 # ~130hz belt tension <= 6600 mm/s accel
shaper_type_y: mzv
shaper_freq_y: 32.0 # ~180hz belt tension <= 3000 mm/s accel

[firmware_retraction]
retract_length: 0.1
retract_speed: 20
unretract_extra_length: 0
unretract_speed: 20

#####################################
#----------X STEPPER CONFIG----------
#####################################

[stepper_x]
step_pin: PA14
dir_pin: PA10
enable_pin: !PA13
microsteps: 64
rotation_distance: 40
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_max: 220
homing_speed: 30
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PB8
diag_pin: PC4
driver_SGTHRS: 97
run_current: 0.95
interpolate: False

#####################################
#----------Y STEPPER CONFIG----------
#####################################

[stepper_y]
step_pin: PC8
dir_pin: PA15
enable_pin: !PC14
microsteps: 64
rotation_distance: 40
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 0
position_max: 235
homing_speed: 30
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC9
diag_pin: PB0
driver_SGTHRS: 91
run_current: 0.95
interpolate: False

#####################################
#----------Z STEPPER CONFIG----------
#####################################

[stepper_z]
step_pin: PD2
dir_pin: !PD4
enable_pin: !PD3
microsteps: 64
rotation_distance: 40
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: PC6
#endstop_pin: probe:z_virtual_endstop
position_endstop: 195.928
position_max: 195.928
position_min: -2
homing_speed: 25
second_homing_speed: 5

[tmc2209 stepper_z]
uart_pin: PD0
run_current: 0.95
interpolate: False

############################
#----------CHAMBER----------
############################

[temperature_sensor Chamber]
sensor_type: Generic 3950
sensor_pin: PA5

[heater_generic chamber_heater]
heater_pin: PB11
sensor_type: Generic 3950
sensor_pin: PA6
control: pid
pid_Kp: 10.728
pid_Ki: 0.563
pid_Kd: 51.090
min_temp: 0
max_temp: 110
max_power: 0.5

[verify_heater chamber_heater]
max_error: 300
check_gain_time: 480
hysteresis: 5
heating_gain: 1

[controller_fan chamber_heater_fan]
pin: PB10
max_power: 1.0
cycle_time: 0.010
fan_speed: 1.0
idle_timeout: 30
idle_speed: 1.0
heater: chamber_heater
stepper:

[controller_fan Nevermore]
pin: PB15
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.100
fan_speed: 1.0
idle_timeout: 300
heater: heater_bed
stepper:

# [led Chamber_LED]
# white_pin: PB11
# cycle_time: 0.010
# initial_white: 0.0

###############################
#----------HEATED_BED----------
###############################

[thermistor keenovo_ender3_350w]
temperature1: 15
resistance1: 157600.0
temperature2: 67
resistance2: 19477.4
temperature3: 120
resistance3: 3850.0

[temperature_sensor Bed_Top]
sensor_type: Generic 3950
sensor_pin: PA4

[heater_bed]
heater_pin: PB2                    # HB
sensor_type: keenovo_ender3_350w
sensor_pin: PA3
control: pid
pid_Kp: 62.201
pid_Ki: 2.941
pid_Kd: 328.887
min_temp: 0
max_temp: 120


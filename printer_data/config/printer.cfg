[include mainsail.cfg]
[include shell_command.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
[include ebb36.cfg]
#[include input_shaper_adxl.cfg]

########################
#----------MCU----------
########################

[mcu]
canbus_uuid: b89c146b52b1
canbus_interface: can0

[temperature_sensor Manta_E3EZ]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 100

[temperature_sensor CB2]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[controller_fan Electronics_Fan]
pin: PA8
max_power: 1.0
shutdown_speed: 1.0
cycle_time: 0.010
fan_speed: 0.5
heater:
stepper: stepper_x, stepper_y, stepper_z

###############################
#----------KINEMATICS----------
###############################

[printer]
kinematics: corexz
max_velocity: 500
max_accel: 3000
max_z_velocity: 100
max_z_accel: 1000
minimum_cruise_ratio: 0.50
square_corner_velocity: 5.0

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 47.4 # ~130hz belt tension <= 6600 mm/s accel
shaper_type_y: mzv
shaper_freq_y: 32.0 # ~180hz belt tension <= 3000 mm/s accel

[firmware_retraction]
retract_length: 0.2
retract_speed: 20
unretract_extra_length: 0
unretract_speed: 20

#####################################
#----------X STEPPER CONFIG----------
#####################################

[stepper_x]
step_pin: PA14
dir_pin: PA10
enable_pin: !PA13
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_max: 220
homing_speed: 30
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PB8
diag_pin: PC4
driver_SGTHRS: 97
run_current: 1.01
interpolate: False
#stealthchop_threshold: 99999

#####################################
#----------Y STEPPER CONFIG----------
#####################################

[stepper_y]
step_pin: PC8
dir_pin: PA15
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 0
position_max: 235
homing_speed: 30
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC9
diag_pin: PB0
driver_SGTHRS: 91
run_current: 1.01
interpolate: False
#stealthchop_threshold: 99999

#####################################
#----------Z STEPPER CONFIG----------
#####################################

[stepper_z]
step_pin: PD2
dir_pin: !PD4
enable_pin: !PD3
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200 #200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: PC6
position_endstop: 196.075
position_max: 196.075
position_min: -2
homing_speed: 20
second_homing_speed: 5

[tmc2209 stepper_z]
uart_pin: PD0
run_current: 1.01
interpolate: False
#stealthchop_threshold: 99999

#########################################
#----------DUMMY STEPPER CONFIG----------
#########################################

[manual_stepper fake_stepper]
step_pin: PB7
dir_pin: !PB6
enable_pin: !PB4
microsteps: 16
rotation_distance: 40


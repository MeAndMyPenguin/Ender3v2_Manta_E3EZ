###############################
#----------HEATED_BED----------
###############################

[thermistor keenovo_ender3_350w]
temperature1: 15
resistance1: 157600.0
temperature2: 67
resistance2: 19477.4
temperature3: 120
resistance3: 3850.0

[temperature_sensor Bed_Top]
sensor_type: Generic 3950
sensor_pin: PA3

[heater_bed]
heater_pin: PB2
sensor_type: keenovo_ender3_350w
sensor_pin: PA4
control: pid
pid_Kp: 64.649
pid_Ki: 2.123
pid_Kd: 492.140
min_temp: 0
max_temp: 120


#####################################
#----------GLOBAL VARIABLES----------
#####################################

[gcode_macro _Probe_Variables]
variable_printer_homed            : False
variable_probe_attached           : False        # DO NOT CHANGE! Used for checking probe attached state
variable_probe_x_offset           : 5.1          # number is positive if probe is to the right of the nozzle
variable_probe_y_offset           : 31.2         # number is positive if probe is behind the nozzle
variable_bed_x_center             : 117.5        # x axis center position
variable_bed_y_center             : 117.5        # y axis center position
variable_zstop_x_pos              : 38           # x position of sexbolt
variable_zstop_y_pos              : -6           # y position of sexbolt
variable_move_speed               : 250          # speed in MM/s
gcode:

####################################
#----------HOMING_OVERRIDE----------
####################################

[homing_override]
set_position_z: 0                                                                # Make printer think Z axis is at zero, so we can force a move upwards away from build plate
axes: xyz
gcode:
  {% set homed = printer["gcode_macro _Probe_Variables"].printer_homed %}
  {% set x_center = printer["gcode_macro _Probe_Variables"].bed_x_center %}
  {% set y_center = printer["gcode_macro _Probe_Variables"].bed_y_center %}
  {% set probe_x_offset = printer["gcode_macro _Probe_Variables"].probe_x_offset %}
  {% set probe_y_offset = printer["gcode_macro _Probe_Variables"].probe_y_offset %}
  {% set zstop_x_pos = printer["gcode_macro _Probe_Variables"].zstop_x_pos %}
  {% set zstop_y_pos = printer["gcode_macro _Probe_Variables"].zstop_y_pos %}
  {% set move_speed = printer["gcode_macro _Probe_Variables"].move_speed * 60 %}

  G90                                                                            # Absolute Coordinates
  G1 Z10 F3000                                                                   # Move nozzle up 10mm at (3000mm/m * 60 = 50mm/s) to prevent accidentally scratching build plate

  {% if not 'X' in params and not 'Y' in params and 'Z' in params %}
    #PROBE_OUT ----- NOT USING PROBE FOR HOMING Z
    M118 Homing Z axis
    G1 X{zstop_x_pos} Y{zstop_y_pos} F{move_speed}
    #G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F15000 ----- PROBE USED AS Z ENDSTOP
    G28 Z
    G1 Z5 F3000
  {% elif not 'Y' in params and not 'Z' in params and 'X' in params %}
    SENSORLESS_HOME_X
  {% elif not 'Z' in params and not 'X' in params and 'Y' in params %}
    SENSORLESS_HOME_Y
  {% else %}
    SENSORLESS_HOME_X
    SENSORLESS_HOME_Y
    #PROBE_OUT ----- NOT USING PROBE FOR HOMING Z
    #G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F15000 ----- PROBE USED AS Z ENDSTOP
    M118 Homing Z axis
    G1 X{zstop_x_pos} Y{zstop_y_pos} F{move_speed}
    G28 Z
    G1 Z5 F3000
    SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=printer_homed VALUE={True}
  {% endif %}

  {% if printer.toolhead.homed_axes == "xyz" %}
    SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=printer_homed VALUE={True}
  {% endif %}

#################################
#----------PROBE OUT/IN----------
#################################

[gcode_macro PROBE_OUT]
description: Pick up klicky probe
gcode:
  {% set attached = printer["gcode_macro _Probe_Variables"].probe_attached %}

  SAVE_GCODE_STATE NAME=PROBE_OUT
  
  {% if attached != True %}
    G90
    G1 X243 F15000 #250mm/s
    G4 P300
    G1 Z15 F3000 #50mm/s
    G1 X215 F15000
    SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=probe_attached VALUE={True}
  {% endif %}

  RESTORE_GCODE_STATE NAME=PROBE_OUT

[gcode_macro PROBE_IN]
description: Put away klicky probe
gcode:
  {% set attached = printer["gcode_macro _Probe_Variables"].probe_attached %}

  SAVE_GCODE_STATE NAME=PROBE_IN

  {% if attached == True %}
    G90
    G1 Z15 F3000 #50mm/s
    G1 X243 F15000 #250mm/s
    G1 Z0 F3000 #50mm/s
    G4 P300
    G1 X215 F15000 #250mm/s
    G1 Z10 F3000 #50mm/s
    SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=probe_attached VALUE={False}
  {% endif %}

  RESTORE_GCODE_STATE NAME=PROBE_OUT

[gcode_macro PROBE_RESET]
description: Reset probe attached variable
gcode:
  SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=probe_attached VALUE={False}

#############################
#----------BED MESH----------
#############################

[bed_mesh]
speed: 500
horizontal_move_z: 5
mesh_min: 5.1,23.2
mesh_max: 223.5,224
probe_count: 7,7
adaptive_margin: 5
mesh_pps: 4,4
algorithm: bicubic

[gcode_macro BED_MESH] #reliant on the macro below
description: Generate bed mesh
gcode:
  SAVE_GCODE_STATE NAME=BED_MESH
  BED_MESH_CALIBRATE ADAPTIVE=1
  RESTORE_GCODE_STATE NAME=BED_MESH

[gcode_macro BED_MESH_CALIBRATE] #macro with parameter passing
rename_existing: _BED_MESH_CALIBRATE
gcode:
  {% set homed = printer["gcode_macro _Probe_Variables"].printer_homed %}
  {% set attached = printer["gcode_macro _Probe_Variables"].probe_attached %}
    
  {% if homed == True and attached == True %}
    M118 Calibrating bed mesh
    _BED_MESH_CALIBRATE {rawparams}
  {% elif homed == True and attached == False %}
    PROBE_OUT
    M118 Calibrating bed mesh
    _BED_MESH_CALIBRATE {rawparams}
  {% else %}
    M118 Homing Printer
    G28
    M118 Setting homed variable to True
    SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=printer_homed VALUE={True}
    M118 Calibrating bed mesh
    _BED_MESH_CALIBRATE {rawparams}
  {% endif %}

###########################
#----------Z-TILT----------
###########################

[z_tilt]
z_positions:
   -25,117.5
   258.5,117.5
points:
   0,86.5
   215,86.5
speed: 500
horizontal_move_z: 5
retries: 10
retry_tolerance: 0.01

[gcode_macro Z_TILT] #reliant on the macro below
description: Adjust Z tilt
gcode:
  SAVE_GCODE_STATE NAME=Z_TILT
  Z_TILT_ADJUST
  RESTORE_GCODE_STATE NAME=Z_TILT

[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
  {% set homed = printer["gcode_macro _Probe_Variables"].printer_homed %}
  {% set attached = printer["gcode_macro _Probe_Variables"].probe_attached %}
    
  {% if homed == True and attached == True %}
    M118 Adjusting Z tilt
    _Z_TILT_ADJUST
    PROBE_IN
    G28 Z
  {% elif homed == True and attached == False %}
    PROBE_OUT
    M118 Adjusting Z tilt
    _Z_TILT_ADJUST
    PROBE_IN
    G28 Z
  {% else %}
    M118 Homing Printer
    G28
    M118 Setting homed variable to True
    SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=printer_homed VALUE={True}
    M118 Adjusting Z tilt
    PROBE_OUT
    _Z_TILT_ADJUST
    PROBE_IN
    G28 Z
  {% endif %}

######################################
#----------PROBE CALIBRATION----------
######################################

[gcode_macro CHECK_PROBE_CALIBRATE]
description: Calibrate probe
gcode: 
  SAVE_GCODE_STATE NAME=PROBE_CALIBRATE
  PROBE_CALIBRATE
  RESTORE_GCODE_STATE NAME=PROBE_CALIBRATE

[gcode_macro PROBE_CALIBRATE]
rename_existing: _PROBE_CALIBRATE
gcode:
  {% set homed = printer["gcode_macro _Probe_Variables"].printer_homed %}
  {% set probe_attached = printer["gcode_macro _Probe_Variables"].probe_attached %}
  {% set x_center = printer["gcode_macro _Probe_Variables"].bed_x_center %}
  {% set y_center = printer["gcode_macro _Probe_Variables"].bed_y_center %}
  {% set probe_x_offset = printer["gcode_macro _Probe_Variables"].probe_x_offset %}
  {% set probe_y_offset = printer["gcode_macro _Probe_Variables"].probe_y_offset %}

  Z_TILT
  PROBE_OUT
  G90
  G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F6000
  _PROBE_CALIBRATE
  TESTZ Z=2
  M118 Remove the Klack to continue calibration!
  
  # {% if homed == True and probe_attached == True %}
  #   Z_TILT
  #   PROBE_OUT
  #   G90
  #   G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F6000
  #   _PROBE_CALIBRATE
  #   TESTZ Z=2
  #   M118 Remove the Klack to continue calibration!
  # {% elif homed == True and probe_attached == False %}
  #   Z_TILT
  #   PROBE_OUT
  #   G90
  #   G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F6000
  #   _PROBE_CALIBRATE
  #   TESTZ Z=2
  #   M118 Remove the Klack to continue calibration!
  # {% else %}
  #   M118 Homing Printer
  #   G28
  #   SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=printer_homed VALUE={True}
  #   Z_TILT
  #   G90
  #   G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F6000
  #   _PROBE_CALIBRATE
  #   TESTZ Z=2
  #   M118 Remove the Klack to continue calibration!
  # {% endif %}

[gcode_macro CHECK_PROBE_ACCURACY]
description: Check probe accuracy
gcode:
  SAVE_GCODE_STATE NAME=PROBE_ACCURACY
  PROBE_ACCURACY
  RESTORE_GCODE_STATE NAME=PROBE_ACCURACY

[gcode_macro PROBE_ACCURACY]
rename_existing: _PROBE_ACCURACY
gcode:
  {% set homed = printer["gcode_macro _Probe_Variables"].printer_homed %}
  {% set probe_attached = printer["gcode_macro _Probe_Variables"].probe_attached %}
  {% set x_center = printer["gcode_macro _Probe_Variables"].bed_x_center %}
  {% set y_center = printer["gcode_macro _Probe_Variables"].bed_y_center %}
  {% set probe_x_offset = printer["gcode_macro _Probe_Variables"].probe_x_offset %}
  {% set probe_y_offset = printer["gcode_macro _Probe_Variables"].probe_y_offset %}

  M118 Homed variable is: {homed} 
  M118 Probe attached variable is: {probe_attached}

  {% if homed == True and probe_attached == True %}
    Z_TILT
    G90
    G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F6000
    _PROBE_ACCURACY
  {% elif homed == True and probe_attached == False %}
    PROBE_OUT
    Z_TILT
    G90
    G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F6000
    _PROBE_ACCURACY
  {% else %}
    M118 Homing Printer
    G28
    M118 Setting homed variable to True
    SET_GCODE_VARIABLE MACRO=_Probe_Variables VARIABLE=printer_homed VALUE={True}
    Z_TILT
    G90
    G1 X{x_center - probe_x_offset} Y{y_center - probe_y_offset} F6000
    _PROBE_ACCURACY
  {% endif %}

####################################
#----------CHECK VARIABLES----------
####################################

[gcode_macro CHECK_HOME]
description: Check is printer is homed
gcode:
  {% set homed = printer["gcode_macro _Probe_Variables"].printer_homed %}
  M118 Homed variable is: {homed} 

[gcode_macro CHECK_AXIS]
description: Check if axis are homed
gcode:
  M118 Homed axis are: {printer.toolhead.homed_axes}

[gcode_macro CHECK_PROBE]
description: Probe is not attached
gcode:
  {% set attached = printer["gcode_macro _Probe_Variables"].probe_attached %}
  M118 Probe attached variable is: {attached}
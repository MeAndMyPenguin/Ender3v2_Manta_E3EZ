#################################
#----------GCODE RENAME----------
#################################

[gcode_macro PROBE_EDDY_NG_TAP]
rename_existing: _PROBE_EDDY_NG_TAP
gcode:
  _PROBE_EDDY_NG_TAP SAMPLES=5 MAX_SAMPLES=9 USE_MEDIAN=1 PLOT=1 TT=1250 

[gcode_macro M109]
rename_existing: M99109
gcode:
  {% set s = params.S|float %}   
  M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
  {% if s != 0 %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
  {% endif %}

[gcode_macro M84]
rename_existing: M8484
gcode:
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=printer_homed VALUE={False}
  TURN_OFF_HEATERS                     # Turn bed / hotend off
  M107                                 # Turn print cooling fan off
  BED_MESH_CLEAR                       # Clears bed mesh
  SET_GCODE_OFFSET Z=0 MOVE=1          # Clears Z offset
  #LED_OFF                              # Turn off LEDs
  RESTORE_TRAVEL_SPEED                 # Restore travel speed to default max
  M8484

[gcode_macro M191]
gcode:
  {% set S = params.S|float %}
  M141 {% for p in params %}
    {'%s%s' % (p, params[p])}
  {% endfor %}																	# Set bed temp
	  
  {% if S != 0 %}
    TEMPERATURE_WAIT SENSOR=chamber_heater MINIMUM={S|int} MAXIMUM={S|int + 5}	# Wait for bed temp within 5 degrees
  {% endif %}

[gcode_macro M141]
gcode:
  {% set S = params.S|float %}
  SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={S}


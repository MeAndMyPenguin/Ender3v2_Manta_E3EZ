#[include btt_sfs2.cfg]
#[include bedfans.cfg]
[include chamber_heater.cfg]
[include nevermore.cfg]
[include calibration.cfg]
[exclude_object] # Enable exclude_object for adaptive meshing

#####################################
#----------GLOBAL VARIABLES----------
#####################################

[gcode_macro _CUSTOM_VARIABLES]
variable_x_homed                  : False        # DO NOT CHANGE. INTERNAL USE ONLY
variable_y_homed                  : False        # DO NOT CHANGE. INTERNAL USE ONLY
variable_z_homed                  : False        # DO NOT CHANGE. INTERNAL USE ONLY
variable_z_move_up                : False        # DO NOT CHANGE. INTERNAL USE ONLY
variable_printing                 : False        # DO NOT CHANGE. INTERNAL USE ONLY
variable_bed_x_center             : 110.0        # x axis center position
variable_bed_y_center             : 113.0        # y axis bed center position
variable_gantry_z_center          : 100.0        # z axis gantry center position
variable_x_wait                   : 110.0        # x axis wait position for pre-heating
variable_y_wait                   : 190.0        # y axis wait position for pre-heating
variable_z_wait                   : 100.0        # z axis wait position for pre-heating
variable_e_temp_wait              : 170.0        # extruder pre-heating temp
variable_x_finish                 : 195.0        # x axis position for presenting print
variable_y_finish                 : 230.0        # y axis position for presenting print
variable_z_finish                 : 10.0         # z axis incremental move after print is finished
variable_e_finish                 : -7.0         # extruder retraction amount after print if finished
variable_e_finish_speed           : 20.0         # extruder retraction speed after print if finished
variable_move_speed               : 60.0         # move speed in MM/s for homing/presenting print
gcode:

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True  # use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 195   # custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 230   # custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 10.0  # custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0   # the value to retract while PAUSE
variable_cancel_retract   : 7.0   # the value to retract while CANCEL_PRINT
variable_speed_retract    : 35.0  # retract speed in mm/s
variable_unretract        : 1.0   # the value to unretract while RESUME
variable_speed_unretract  : 35.0  # unretract speed in mm/s
variable_speed_hop        : 50.0  # z move speed in mm/s
variable_speed_move       : 100.0 # move speed in mm/s
variable_park_at_cancel   : True  # allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 195   # different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 230   # different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
## !!! Caution [firmware_retraction] must be defined in the printer.cfg if you set use_fw_retract: True !!!
variable_use_fw_retract   : True  # use fw_retraction instead of the manual version [True/False]
variable_idle_timeout     : 1800  # time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
variable_runout_sensor    : "" #"filament_switch_sensor Switch_Sensor"   # If a sensor is defined, it will be used to cancel the execution of RESUME in case no filament is detected.
gcode:

####################################
#----------HOMING OVERRIDE----------
####################################

[homing_override]
set_position_z: 0                                                                # Make printer think Z axis is at zero, so we can force a move upwards away from build plate
axes: xyz
gcode:
  {% set x_homed = printer["gcode_macro _CUSTOM_VARIABLES"].x_homed %}
  {% set y_homed = printer["gcode_macro _CUSTOM_VARIABLES"].y_homed %}
  {% set z_homed = printer["gcode_macro _CUSTOM_VARIABLES"].z_homed %}
  {% set z_move_up = printer["gcode_macro _CUSTOM_VARIABLES"].z_move_up %}
  {% set x_center = printer["gcode_macro _CUSTOM_VARIABLES"].bed_x_center %}
  {% set y_center = printer["gcode_macro _CUSTOM_VARIABLES"].bed_y_center %}
  {% set z_center = printer["gcode_macro _CUSTOM_VARIABLES"].gantry_z_center %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}

  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_homed VALUE={False}

  {% if not 'Y' in params and not 'Z' in params and 'X' in params %}             # Home ONLY X axis
    {% if z_move_up != True %}
      G90
      G1 Z10 F{move_speed}
      SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_move_up VALUE={True}
      SENSORLESS_HOME_X
    {% else %}
      SENSORLESS_HOME_X
    {% endif %}
  {% elif not 'Z' in params and not 'X' in params and 'Y' in params %}           # Home ONLY Y axis
    {% if z_move_up != True %}
      G90
      G1 Z10 F{move_speed}
      SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_move_up VALUE={True}
      SENSORLESS_HOME_Y
    {% else %}
      SENSORLESS_HOME_Y
    {% endif %}
  {% elif not 'X' in params and not 'Y' in params and 'Z' in params %}           # If homing Z axis, will check if x and y is homed first, then homes Z
    {% if x_homed == True and y_homed == True %}
      G1 X{x_center} Y{y_center} F{move_speed}
      M118 Homing Z axis
      G28 Z
      SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_homed VALUE={True}
      G1 Z{z_center} F{move_speed}
    {% elif x_homed != True and y_homed == True %}                               # If x is NOT homed and y IS homed, will home X 
      G90                                                                        # Absolute Coordinates
      SENSORLESS_HOME_X
      G1 X{x_center} Y{y_center} F{move_speed}
      M118 Homing Z axis
      G28 Z
      SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_homed VALUE={True}
      G1 Z{z_center} F{move_speed}
    {% elif x_homed == True and y_homed != True %}                               # If x IS homed and y is NOT homed, will home Y
      G90                                                                        # Absolute Coordinates
      SENSORLESS_HOME_Y
      G1 X{x_center} Y{y_center} F{move_speed}
      M118 Homing Z axis
      G28 Z
      SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_homed VALUE={True}
      G1 Z{z_center} F{move_speed}
    {% else %}                                                                    # If no specific axis is requested to home, then will home all axis
      G90
      G1 Z10 F{move_speed}
      SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_move_up VALUE={True}
      SENSORLESS_HOME_X
      SENSORLESS_HOME_Y
      G1 X{x_center} Y{y_center} F{move_speed}
      M118 Homing Z axis
      G28 Z
      SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_homed VALUE={True}
      G1 Z{z_center} F{move_speed}
    {% endif %}
  {% else %}
    G90
    G1 Z10 F{move_speed}
    SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_move_up VALUE={True}
    SENSORLESS_HOME_X
    SENSORLESS_HOME_Y
    G1 X{x_center} Y{y_center} F{move_speed}
    M118 Homing Z axis
    G28 Z
    SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_homed VALUE={True}
    G1 Z{z_center} F{move_speed}
  {% endif %}


[gcode_macro CHECK_VARIABLES]
gcode:
  {% set x_homed = printer["gcode_macro _CUSTOM_VARIABLES"].x_homed %}
  {% set y_homed = printer["gcode_macro _CUSTOM_VARIABLES"].y_homed %}
  {% set z_homed = printer["gcode_macro _CUSTOM_VARIABLES"].z_homed %}
  {% set z_move_up = printer["gcode_macro _CUSTOM_VARIABLES"].z_move_up %}
  {% set printing = printer["gcode_macro _CUSTOM_VARIABLES"].printing %}

  M118 Variable "x_homed" is: {x_homed}
  M118 Variable "y_homed" is: {y_homed}
  M118 Variable "z_homed" is: {z_homed}
  M118 Variable "z_move_up" is: {z_move_up}
  M118 Variable "printing" is: {printing}

################################
#----------START PRINT----------
################################

[gcode_macro PRINT_START]
description: Starts the print
gcode:
  {% set x_homed = printer["gcode_macro _CUSTOM_VARIABLES"].x_homed %}
  {% set y_homed = printer["gcode_macro _CUSTOM_VARIABLES"].y_homed %}
  {% set z_homed = printer["gcode_macro _CUSTOM_VARIABLES"].z_homed %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}
  {% set e_temp_wait = printer["gcode_macro _CUSTOM_VARIABLES"].e_temp_wait %}
  {% set x_wait = printer["gcode_macro _CUSTOM_VARIABLES"].x_wait %}
  {% set y_wait = printer["gcode_macro _CUSTOM_VARIABLES"].y_wait %}
  {% set z_wait = printer["gcode_macro _CUSTOM_VARIABLES"].z_wait %}
  {% set target_bed = params.BED_TEMP|float %}
  {% set target_extruder = params.EXTRUDER_TEMP|float %}
  {% set material = params.FILAMENT_TYPE|default("PLA")|string %}

  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=filament VALUE={"PLA"}
  SET_NEVERMORE

  {% if x_homed != True or y_homed != True or z_homed != true %}   # Checks if printer is homed, if not will home the printer
    G28
  {% endif %}

  G90                                                   # Use absolute coordinates
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=printing VALUE=True
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=chamber_temp VALUE={params.CHAMBER_TEMP}
  G1 X{x_wait} Y{y_wait} Z{z_wait} F{move_speed}        # Go to center of the bed
  #SET_NEVERMORE                                         # Turns on nevermore air scrubber
  M118 Heating bed to: {target_bed}c                    # Display info
  M190 S{target_bed}                                    # Set target temp for the bed
  M118 Pre-heating nozzle to: {e_temp_wait}c            # Display info
  M109 S{e_temp_wait}                                   # Pre-heat hotend to wait temp
  SET_CHAMBER_HEATER                                    # Sets chamber temperature unless chamber temp is 0
  M118 Waiting for bed to be within 4 degrees of {target_bed} # Display info
  TEMPERATURE_WAIT SENSOR="temperature_sensor Bed_Top" MINIMUM={target_bed - 4}   # Waits for bed surface to be within 2 degrees of target bed
  CALIBRATE_BED_MESH                                    # Generating a new adaptive bed mesh
  M118 Heating nozzle to: {target_extruder}c            # Display info
  M109 S{target_extruder}                               # Heat hotend to target temp
  NOZZLE_WIPE                                           # Wipe nozzle
  VORON_PURGE                                           # Filament purge
  DAYLIGHT_ON
    
##############################
#----------END PRINT----------
##############################

[gcode_macro END_PRINT]
description: Ends the print
gcode:
  {% set x_finish = printer["gcode_macro _CUSTOM_VARIABLES"].x_finish %}
  {% set y_finish = printer["gcode_macro _CUSTOM_VARIABLES"].y_finish %}
  {% set z_finish = printer["gcode_macro _CUSTOM_VARIABLES"].z_finish %}
  {% set e_finish = printer["gcode_macro _CUSTOM_VARIABLES"].e_finish %}
  {% set e_finish_speed = printer["gcode_macro _CUSTOM_VARIABLES"].e_finish_speed * 60 %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}
  
  G91                                                   # Incremental Coordinates
  G1 Z{z_finish} F{move_speed}                          # Move nozzle 10mm up
  G1 E{e_finish} F{e_finish_speed}                      # Retract 7mm
  G90                                                   # Absolute coordinates
  G1 X{x_finish} Y{y_finish} F{move_speed}              # Present finished print
  M84                                                   # Turn everything off
  DAYLIGHT_OFF
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=printing VALUE=False

#################################
#----------CANCEL PRINT----------
#################################

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set allow_park = client.park_at_cancel|default(false)|lower == 'true' %}
  {% set retract = client.cancel_retract|default(5.0)|abs %}
  ##### define park position #####
  {% set park_x = "" if (client.park_at_cancel_x|default(none) is none)
            else "X=" ~ client.park_at_cancel_x %}
  {% set park_y = "" if (client.park_at_cancel_y|default(none) is none)
            else "Y=" ~ client.park_at_cancel_y %}
  {% set custom_park = park_x|length > 0 or park_y|length > 0 %}
  ##### end of definitions #####
  # restore idle_timeout time if needed
  {% if printer['gcode_macro RESUME'].restore_idle_timeout > 0 %}
    SET_IDLE_TIMEOUT TIMEOUT={printer['gcode_macro RESUME'].restore_idle_timeout}
  {% endif %}
  {% if (custom_park or not printer.pause_resume.is_paused) and allow_park %} _TOOLHEAD_PARK_PAUSE_CANCEL {park_x} {park_y} {% endif %}
  _CLIENT_RETRACT LENGTH={retract}
  TURN_OFF_HEATERS
  M106 S0
  {client.user_cancel_macro|default("")}
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=False
  # clear pause_next_layer and pause_at_layer as preparation for next print
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  CANCEL_PRINT_BASE
  DAYLIGHT_OFF
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=printing VALUE=False
  M84

##################################
#----------RESTORE SPEED----------
##################################

[gcode_macro RESTORE_TRAVEL_SPEED]
description: Restores travel speed to default
gcode:
  SET_VELOCITY_LIMIT VELOCITY=500
  SET_VELOCITY_LIMIT ACCEL=6000

##################################
#----------CENTER POSITION----------
##################################

[gcode_macro CENTER_AXIS]
description: Restores travel speed to default
gcode:
  {% set x_center = printer["gcode_macro _CUSTOM_VARIABLES"].bed_x_center %}
  {% set y_center = printer["gcode_macro _CUSTOM_VARIABLES"].bed_y_center %}
  {% set z_center = printer["gcode_macro _CUSTOM_VARIABLES"].gantry_z_center %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}

  G90
  G1 X{x_center} Y{y_center} Z{z_center} F{move_speed}

######################################
#----------SENSORLESS HOME X----------
######################################

[gcode_macro SENSORLESS_HOME_X]
description: Sensorless home the X axis
gcode:
  {% set x_homed = printer["gcode_macro _CUSTOM_VARIABLES"].x_homed %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}
  {% set HOME_CUR = 0.760 %}
  {% set driver_config = printer.configfile.settings['tmc2209 stepper_x'] %}
  {% set RUN_CUR = driver_config.run_current %}

  {% if x_homed != True %}
    G90                                                                        # Absolute Coordinates
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR}                       # set home current
    M118 Homing X axis                                                         # display info
    G4 P2000                                                                   # wait
    G28 X0                                                                     # home
    G90                                                                        # absolute coordinates
    G1 X5 F1200                                                                # move 5mm away from 0 position
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR}                        # set run current
    SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=x_homed VALUE={True}
  {% else %}
    M118 X is homed
  {% endif %}

######################################
#----------SENSORLESS HOME Y----------
######################################

[gcode_macro SENSORLESS_HOME_Y]
description: Sensorless home the Y axis
gcode:
  {% set y_homed = printer["gcode_macro _CUSTOM_VARIABLES"].y_homed %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}
  {% set HOME_CUR = 0.760 %}
  {% set driver_config = printer.configfile.settings['tmc2209 stepper_y'] %}
  {% set RUN_CUR = driver_config.run_current %}

  {% if y_homed != True %}
    G90                                                                        # Absolute Coordinates
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR}                       # set home current
    M118 Homing Y axis                                                         # display info
    G4 P2000                                                                   # wait
    G28 Y0                                                                     # home
    G90                                                                        # absolute coordinates
    G1 Y5 F1200                                                                # move 5mm away from 0 position
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR}                        # set run current
    SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=y_homed VALUE={True}
  {% else %}
    M118 Y is homed
  {% endif %}

################################
#----------NOZZLE WIPE----------
################################

[gcode_macro NOZZLE_WIPE]
description: Wipes the nozzle clean
gcode:

  SAVE_GCODE_STATE NAME=clean_nozzle_state

  {% set x_homed = printer["gcode_macro _CUSTOM_VARIABLES"].x_homed %}
  {% set y_homed = printer["gcode_macro _CUSTOM_VARIABLES"].y_homed %}
  {% set z_homed = printer["gcode_macro _CUSTOM_VARIABLES"].z_homed %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}
  {% set wipe_count = 8 %}                # Amount of times to wipe
  {% set x_pos1 = 90 %}                   # X wipe position 1
  {% set x_pos2 = 128 %}                  # X wipe position 2
  {% set y_pos1 = 230 %}                  # Y wipe position 1
  {% set y_pos2 = 235 %}                  # Y wipe position 2
  {% set z_pos1 = 5 %}                    # Z wait position
  {% set z_pos2 = 1.5 %}                  # Z wipe position
    
  {% if x_homed != True or y_homed != True or z_homed != true %}   # Checks if printer is homed, if not will home the printer
    G28
  {% endif %}
  
  G90
  M118 Cleaning nozzle
  G1 Z{z_pos1} F{move_speed}                      # Move Z to wait
  {% for wipe in range(wipe_count) %}
    {% for coordinate in [(x_pos1,y_pos1),(x_pos2,y_pos2)] %}
      G1 X{coordinate[0]} Y{coordinate[1]} * wipe} Z{z_pos2} F{move_speed}
    {% endfor %}
  {% endfor %}
  G1 Z{z_pos1}                                    # Move Z up 5mm
  
  RESTORE_GCODE_STATE NAME=clean_nozzle_state

#################################
#----------CHAMBER LEDS----------
#################################

[gcode_macro DAYLIGHT_ON]
description: Daylight On
gcode:
  SET_PIN PIN=Daylight VALUE=1.0

[gcode_macro DAYLIGHT_OFF]
description: Daylight Off
gcode:
  SET_PIN PIN=Daylight VALUE=0

#################################
#----------GCODE RENAME----------
#################################

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE                               # In calibration.cfg
gcode:
  {% set x_homed = printer["gcode_macro _CUSTOM_VARIABLES"].x_homed %}
  {% set y_homed = printer["gcode_macro _CUSTOM_VARIABLES"].y_homed %}
  {% set z_homed = printer["gcode_macro _CUSTOM_VARIABLES"].z_homed %}
  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}
  
  {% if x_homed != True or y_homed != True or z_homed != true %}   # Checks if printer is homed, if not will home the printer
    G28
  {% endif %}
  
  G90
  G1 Z2 F{move_speed}
  _BED_MESH_CALIBRATE METHOD=rapid_scan

[gcode_macro M109]
rename_existing: M99109
gcode:
  {% set s = params.S|float %}
  
  M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  # Set hotend temp
  {% if s != 0 %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s + 1}   # Wait for hotend temp (within 1 degree)
  {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set s = params.S|float %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   # Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}  # Wait for bed temp (within 1 degree)
    {% endif %}

[gcode_macro M84]
rename_existing: M8484
gcode:
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=x_homed VALUE={False}
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=y_homed VALUE={False}
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_homed VALUE={False}
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=z_move_up VALUE={False}
  SET_GCODE_OFFSET Z=0.000 MOVE=1      # Clear z offset
  TURN_OFF_HEATERS                     # Turn bed / hotend off
  M107                                 # Turn print cooling fan off
  BED_MESH_CLEAR                       # Clears bed mesh
  #LED_OFF                              # Turn off LEDs
  RESTORE_TRAVEL_SPEED                 # Restore travel speed to default max
  M8484

#############################
#----------SPOOLMAN----------
#############################

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=id
    )}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}    
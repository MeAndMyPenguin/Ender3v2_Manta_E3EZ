  {% set move_speed = printer["gcode_macro _CUSTOM_VARIABLES"].move_speed * 60 %}
  
  {% if homed == False %}
    G28                                                 # Checks if printer is homed, if not will home the printer
  {% endif %}

  G90
  G1 Z2 F{move_speed}
  #PROBE_EDDY_NG_TAP                                     # Eddy NG tap with MAX_SAMPLES=7 MODE=butter THRESHOLD=1000
  _BED_MESH_CALIBRATE METHOD=rapid_scan

[gcode_macro CALIBRATE_BED_SCREWS]
description: Level bed screws
gcode:
  {% set homed = printer["gcode_macro _CUSTOM_VARIABLES"].printer_homed %}
  
  {% if homed == False %}
    G28                                                 # Checks if printer is homed, if not will home the printer
  {% endif %}
  
  SCREWS_TILT_CALCULATE


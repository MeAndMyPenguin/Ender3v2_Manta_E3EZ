[mcu EBB36]
canbus_uuid: c4cdb986010c #fb582f1f8a88 - blown heater fan
canbus_interface: can0

[temperature_sensor EBB36]
sensor_type: temperature_mcu
sensor_mcu: EBB36
min_temp: 0
max_temp: 100

[extruder]
step_pin: EBB36: PD0
dir_pin: !EBB36: PD1
enable_pin: !EBB36: PD2
microsteps: 16
rotation_distance: 23.2
gear_ratio: 3:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB36: PB13
sensor_type: Generic 3950
sensor_pin: EBB36: PA3
control: pid
pid_Kp: 33.463
pid_Ki: 4.056
pid_Kd: 69.01
min_temp: 10
max_temp: 300
max_extrude_cross_section: 5

[tmc2209 extruder]
uart_pin: EBB36: PA15
run_current: 0.84
interpolate: False

[fan]
pin: EBB36: PA0

[heater_fan hotend_fan]
pin: EBB36: PA1
heater: extruder
heater_temp: 50.0

[probe_eddy_current Eddy_Coil]
sensor_type: ldc1612
z_offset: 2
i2c_mcu: EBB36
i2c_bus: i2c3_PB3_PB4
x_offset: 0
y_offset: 21.42
reg_drive_current: 16

[bed_mesh]
horizontal_move_z: 4
speed: 200
mesh_min: 5, 5
mesh_max: 215, 225
probe_count: 9, 9
algorithm: bicubic
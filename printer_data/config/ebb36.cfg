[mcu EBB36]
canbus_uuid: c4cdb986010c #fb582f1f8a88 - blown heater fan
canbus_interface: can0

[temperature_sensor EBB36]
sensor_type: temperature_mcu
sensor_mcu: EBB36
min_temp: 0
max_temp: 100

[extruder]
step_pin: EBB36: PD0
dir_pin: EBB36: PD1
enable_pin: !EBB36: PD2
microsteps: 16
rotation_distance: 47.088
gear_ratio: 9:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB36: PB13
sensor_type: Generic 3950
sensor_pin: EBB36: PA3
control: pid
pid_Kp: 33.090
pid_Ki: 4.085
pid_Kd: 67.007
min_temp: 0
max_temp: 300
max_extrude_cross_section: 5
min_extrude_temp: 0
max_extrude_only_distance: 100

[tmc2209 extruder]
uart_pin: EBB36: PA15
run_current: 0.60
interpolate: False

[fan]
pin: EBB36: PA0

[heater_fan hotend_fan]
pin: EBB36: PA1
heater: extruder
heater_temp: 50.0

[probe_eddy_current btt_eddy]
sensor_type: ldc1612
i2c_mcu: EBB36
i2c_bus: i2c3_PB3_PB4
x_offset: 0.0
y_offset: 23.08
z_offset: 3.0

[bed_mesh]
horizontal_move_z: 2
speed: 200
mesh_min: 10, 23.08
mesh_max: 195, 201.92
probe_count: 5, 5
mesh_pps: 4, 4
algorithm: bicubic
scan_overshoot: 5

[screws_tilt_adjust]
screw1: 25, 4.58
screw1_name: front left screw
screw2: 195, 4.58
screw2_name: front right screw
screw3: 195, 174.58
screw3_name: rear right screw
screw4: 25, 174.58
screw4_name: rear left screw
horizontal_move_z: 10.0
speed: 150.0
horizontal_move_z: 3
screw_thread: CW-M3

[neopixel Toolhead_LED]
pin: EBB36: PD3
chain_count: 3

[led_effect Toolhead_LED_Idle]
autostart:              true
frame_rate:             24
leds:
    neopixel:Toolhead_LED (1-2)
    neopixel:Toolhead_LED (3)
layers:
    breathing  8 0 top (0.5, 0.5, 0.5)

[led_effect Bed_Effects]
leds:
    neopixel:Toolhead_LED
autostart:                          true
frame_rate:                         24
heater:                             heater_bed
layers:
    heater  50 0 add    (1,1,0),(1,0,0)
    static  0  0 top    (1,0,0)
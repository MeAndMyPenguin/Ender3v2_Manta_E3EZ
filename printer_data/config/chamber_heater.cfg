[gcode_macro CHAMBER_HEATER_ON]
gcode:
  SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=90

[gcode_macro CHAMBER_HEATER_OFF]
gcode:
  SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0

[gcode_macro SET_CHAMBER_HEATER]
variable_target_chamber: 0
gcode:
  {% set target_chamber = params.CHAMBER_TEMP|float %}
  {% set actual_chamber = printer["temperature_sensor Chamber"].temperature %}

  {% if target_chamber != 0 %}
    {% if target_chamber > actual_chamber %}
      M118 Target temp({target_chamber}) is greater than chamber temp({actual_chamber})
      CHAMBER_HEATER_ON
      SET_GCODE_VARIABLE MACRO=SET_CHAMBER_HEATER VARIABLE=target_chamber VALUE={params.CHAMBER_TEMP}
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=1
    {% else %}
      M118 Target temp({target_chamber}) is less than chamber temp({actual_chamber})
      SET_GCODE_VARIABLE MACRO=SET_CHAMBER_HEATER VARIABLE=target_chamber VALUE={params.CHAMBER_TEMP}
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=1
    {% endif %}
  {% else %}
    M118 Target chamber is 0
    CHAMBER_HEATER_OFF
    UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=0
  {% endif %}

[delayed_gcode CHAMBER_HEATER_LOOP]
gcode:
  {% set target_chamber =  printer["gcode_macro SET_CHAMBER_HEATER"].target_chamber %}
  {% set actual_chamber = printer["temperature_sensor Chamber"].temperature %}

  UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=5
  {% if target_chamber < actual_chamber %}
    CHAMBER_HEATER_OFF
    UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=5
  {% else %}
    CHAMBER_HEATER_ON
    UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=5
  {% endif %}
[gcode_macro _CUSTOM_VARIABLES]
variable_chamber_temp             : 0.0          # DO NOT CHANGE. INTERNAL USE ONLY
variable_heater_on                : 120          # On heater temperature
variable_heater_off               : 0            # Off heater temperature

[heater_generic Heater_Chamber]
heater_pin: PB11
sensor_type: Generic 3950
sensor_pin: PA6
control: pid
pid_Kp: 17.850
pid_Ki: 2.245
pid_Kd: 35.478
min_temp: 0
max_temp: 140
max_power: 1.0

[verify_heater Heater_Chamber]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[controller_fan Heater_fan]
pin: PB14
max_power: 1.0
cycle_time: 0.010
fan_speed: 1.0
idle_timeout: 30
idle_speed: 1.0
heater: Heater_Chamber
stepper:

[gcode_macro CHAMBER_HEATER_ON]
gcode:
  {% set variables = printer["gcode_macro _CUSTOM_VARIABLES"] %}
  SET_HEATER_TEMPERATURE HEATER=Heater_Chamber TARGET={variables.heater_on}                    # Chamber heater temp when ON

[gcode_macro CHAMBER_HEATER_OFF]
gcode:
  {% set variables = printer["gcode_macro _CUSTOM_VARIABLES"] %}
  SET_HEATER_TEMPERATURE HEATER=Heater_Chamber TARGET={={variables.heater_off}                    # Chamber heater temp when OFF

[gcode_macro SET_CHAMBER_HEATER]
gcode:
  {% set variables = printer["gcode_macro _CUSTOM_VARIABLES"] %}
  {% set current_chamber = printer["temperature_sensor Chamber"].temperature %}

  {% if variables.chamber_temp != 0 %}                                      # For when the chamber temp value is anything but 0
    {% if current_chamber <= variables.chamber_temp %}                      # Checks the target chamber temp value to the current chamber temp sensor
      M118 Heating chamber to: {variables.chamber_temp}c. Current chamber temp: {current_chamber}c.   # Display info
      CHAMBER_HEATER_ON                                                     # Turns on chamber
      TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={variables.chamber_temp}   # Waits until the target chamber temp is met
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=1                # If the current chamber temp is less than or equal to the target chamber temp value, enters the monitoring loops until it does
    {% else %}                                                              # For when the chamber temp value is less than the target chamber temp value
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=1                # If the current chamber temp value equals the target chamber temp value, turns off the heater and enters the monitoring loop
    {% endif %}
  {% else %}                                                                # For when the chamber temp value is 0.
    M118 No chamber temp set.                                               # Display info
    CHAMBER_HEATER_OFF                                                      # Turns off the heater in case it is on
  {% endif %}

[delayed_gcode CHAMBER_HEATER_LOOP]
gcode:
  {% set variables = printer["gcode_macro _CUSTOM_VARIABLES"] %}
  {% set current_chamber = printer["temperature_sensor Chamber"].temperature %}

  {% if variables.printing == True %}                                       # For when printing value is True
    {% if current_chamber >= variables.chamber_temp %}                      # For when the current chamber temp value is greater than the target chamber temp value
      CHAMBER_HEATER_OFF                                                    # Turns off the heater
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=5                # Enters the monitoring loop until the current chamber temp value is greater than the target chamber temp value
    {% else %}                                                              # For when the current chamber temp value is less than the target chamber temp value
      CHAMBER_HEATER_ON                                                     # Turns on the heater
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=5                # Enters the monitoring loop until the current chamber temp value is less than the target chamber temp value
    {% endif %}
  {% else %}                                                                # For when printing value is False
    UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=0                  # Stop the monitoring loop
  {% endif %}
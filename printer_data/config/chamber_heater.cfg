[gcode_macro _CUSTOM_VARIABLES]
variable_chamber_temp             : 0.0          # DO NOT CHANGE. INTERNAL USE ONLY

[heater_generic Heater_Chamber]
heater_pin: PB11
sensor_type: Generic 3950
sensor_pin: PA6
control: pid
pid_Kp: 10.728
pid_Ki: 0.563
pid_Kd: 51.090
min_temp: 0
max_temp: 110
max_power: 0.5

[verify_heater Heater_Chamber]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[controller_fan Heater_fan]
pin: PB14
max_power: 1.0
cycle_time: 0.010
fan_speed: 1.0
idle_timeout: 30
idle_speed: 1.0
heater: Heater_Chamber
stepper:

[gcode_macro CHAMBER_HEATER_ON]
gcode:
  SET_HEATER_TEMPERATURE HEATER=Heater_Chamber TARGET=90                    # Chamber heater temp when ON

[gcode_macro CHAMBER_HEATER_OFF]
gcode:
  SET_HEATER_TEMPERATURE HEATER=Heater_Chamber TARGET=0                     # Chamber heater temp when OFF

[gcode_macro SET_CHAMBER_HEATER]
gcode:
  {% set target_chamber = printer["gcode_macro _CUSTOM_VARIABLES"].chamber_temp %}
  {% set actual_chamber = printer["temperature_sensor Chamber"].temperature %}

  {% if target_chamber != 0 %}                                              # For when the chamber temp value is anything but 0
    {% if target_chamber > actual_chamber %}                                # Checks the target chamber temp value to the current chamber temp sensor
      M118 Heating chamber to: {target_chamber}c. Current chamber temp: {actual_chamber}c.   # Display info
      CHAMBER_HEATER_ON                                                     # Turns on chamber
      TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber" MINIMUM={target_chamber}   # Waits until the target chamber temp is met
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=1                # If the current chamber temp does not equal the target chamber temp value, enters the monitoring loops until it does
    {% else %}                                                              # For when the chamber temp value is less than the target chamber temp value
      M118 Target chamber temp({target_chamber}c) is less than chamber temp({actual_chamber}c). Turning heater off.   # Display info
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=1                # If the current chamber temp value equals the target chamber temp value, turns off the heater and enters the monitoring loop
    {% endif %}
  {% else %}                                                                # For when the chamber temp value is 0.
    M118 No chamber temp set.                                               # Display info
    CHAMBER_HEATER_OFF                                                      # Turns off the heater
    UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=0                  # Stop the monitoring loop
  {% endif %}

[delayed_gcode CHAMBER_HEATER_LOOP]
gcode:
  {% set printing =  printer["gcode_macro _CUSTOM_VARIABLES"].printing %}
  {% set target_chamber =  printer["gcode_macro _CUSTOM_VARIABLES"].chamber_temp %}
  {% set actual_chamber = printer["temperature_sensor Chamber"].temperature %}

  {% if printing == True %}                                                 # For when printing value is True
    {% if target_chamber < actual_chamber %}                                # For when the current chamber temp value is greater than the target chamber temp value
      CHAMBER_HEATER_OFF                                                    # Turns off the heater
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=5                # Enters the monitoring loop until the current chamber temp value is greater than the target chamber temp value
    {% else %}                                                              # For when the current chamber temp value is less than the target chamber temp value
      CHAMBER_HEATER_ON                                                     # Turns on the heater
      UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=5                # Enters the monitoring loop until the current chamber temp value is less than the target chamber temp value
    {% endif %}
  {% else %}                                                                # For when printing value is False
    UPDATE_DELAYED_GCODE ID=CHAMBER_HEATER_LOOP DURATION=0                  # Stop the monitoring loop
  {% endif %}
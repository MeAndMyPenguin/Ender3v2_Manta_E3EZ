[gcode_macro _NEVERMORE_VARIABLES]
variable_speed_on            : 1.0
variable_speed_off           : 0.0
variable_runtime             : 5
gcode:

[gcode_macro PRINTING_TRUE]
gcode:
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=printing VALUE={True}

[gcode_macro PRINTING_FALSE]
gcode:
  SET_GCODE_VARIABLE MACRO=_CUSTOM_VARIABLES VARIABLE=printing VALUE={False}

[gcode_macro NEVERMORE_ON]
gcode:
  {% set speed_on = printer["gcode_macro _NEVERMORE_VARIABLES"].speed_on %}
  SET_FAN_SPEED FAN=Nevermore SPEED={speed_on}

[gcode_macro NEVERMORE_OFF]
gcode:
  {% set speed_off = printer["gcode_macro _NEVERMORE_VARIABLES"].speed_off %}
  SET_FAN_SPEED FAN=Nevermore SPEED={speed_off}

[gcode_macro SET_NEVERMORE]
gcode:
  {% set printing =  printer["gcode_macro _CUSTOM_VARIABLES"].printing %}

  {% if printing == True %}
    NEVERMORE_ON
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=1
  {% else %}
    NEVERMORE_OFF
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=0
  {% endif %}

[delayed_gcode NEVERMORE_LOOP]
gcode:
  {% set printing =  printer["gcode_macro _CUSTOM_VARIABLES"].printing %}
  {% set runtime = printer["gcode_macro _NEVERMORE_VARIABLES"].runtime * 1000 %}

  {% if printing == True %}
    NEVERMORE_ON
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=5
  {% else %}
    NEVERMORE_ON
    M118 Waiting {printer["gcode_macro _NEVERMORE_VARIABLES"].runtime} minutes
    G4 P{runtime}
    NEVERMORE_OFF
  {% endif %}
[gcode_macro _CUSTOM_VARIABLES]
variable_speed_on            : 1.0          # Speed when fan is on
variable_speed_off           : 0.0          # Speed when fan is off
variable_runtime             : 5            # Time in minutes for fan to run after print is finished
gcode:

[fan_generic Nevermore]
pin: PB15
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.010

[gcode_macro NEVERMORE_ON]
gcode:
  {% set speed = printer["gcode_macro _CUSTOM_VARIABLES"].speed_on %}
  SET_FAN_SPEED FAN=Nevermore SPEED={speed}

[gcode_macro NEVERMORE_OFF]
gcode:
  {% set speed = printer["gcode_macro _CUSTOM_VARIABLES"].speed_off %}
  SET_FAN_SPEED FAN=Nevermore SPEED={speed}

[gcode_macro SET_NEVERMORE]
gcode:
  {% set material = printer["gcode_macro _CUSTOM_VARIABLES"].material %}
  
  {% if material|lower == "pla" or material|lower == "petg" or material|lower == "abs" or material|lower == "asa" %}
    NEVERMORE_ON
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=1
  {% endif %}

[delayed_gcode NEVERMORE_LOOP]
gcode:
  {% set printing =  printer["gcode_macro _CUSTOM_VARIABLES"].printing %}
  {% set runtime = printer["gcode_macro _CUSTOM_VARIABLES"].runtime * 60 * 1000 %}

  {% if printing == True %}
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=5
  {% else %}
    M118 Scrubbing air for {printer["gcode_macro _CUSTOM_VARIABLES"].runtime} minutes
    G4 P{runtime}
    NEVERMORE_OFF
    M118 Finished
  {% endif %}
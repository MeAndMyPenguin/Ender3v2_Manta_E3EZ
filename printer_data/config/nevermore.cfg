[gcode_macro TEST_NEVERMORE]
gcode:
  

[gcode_macro NEVERMORE_ON]
gcode:
  SET_FAN_SPEED FAN=Nevermore SPEED=1.0

[gcode_macro NEVERMORE_OFF]
gcode:
  SET_FAN_SPEED FAN=Nevermore SPEED=0.0

[gcode_macro SET_NEVERMORE]
gcode:
  {% set printing =  printer["gcode_macro _CUSTOM_VARIABLES"].printing %}

  {% if printing == True %}
    NEVERMORE_ON
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=1
  {% else %}
    NEVERMORE_OFF
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=0
  {% endif %}

[gcode_macro NEVERMORE_LOOP]
variables_finished_runtime: 5
gcode:
  {% set printing =  printer["gcode_macro _CUSTOM_VARIABLES"].printing %}
  {% set time = printer["gcode_macro NEVERMORE_LOOP"].finished_runtime * 60 %}

  {% if printing == True %}
    NEVERMORE_ON
    UPDATE_DELAYED_GCODE ID=NEVERMORE_LOOP DURATION=5
  {% else %}
    NEVERMORE_ON
    G4 S{time}
    NEVERMORE_OFF
  {% endif %}
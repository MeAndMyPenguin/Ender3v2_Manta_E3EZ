[gcode_macro _CUSTOM_VARIABLES]
variable_material               : ""
variable_pla_offset             : -0.070
variable_petg_offset            : -0.070
variable_tpu_offset             : -0.070
variable_abs_offset             : -0.070
variable_asa_offset             : -0.090
gcode:

[gcode_macro SET_MATERIAL]
gcode:
  {% set material = printer["gcode_macro _CUSTOM_VARIABLES"].material %}

  {% if material|lower == "pla" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].pla_offset %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% elif material|lower == "petg" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].petg_offset %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% elif material|lower == "tpu" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].tpu_offset %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% elif material|lower == "abs" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].abs_offset %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% elif material|lower == "asa" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].asa_offset %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% else %}
    M118 No material set
    
  {% endif %}
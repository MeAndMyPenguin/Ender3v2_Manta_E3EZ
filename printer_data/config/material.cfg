[gcode_macro _CUSTOM_VARIABLES]
variable_material               : ""

variable_pla_offset             : -0.070
variable_pla_retraction         : 0.1
variable_pla_retraction_speed   : 20

variable_petg_offset            : -0.070
variable_petg_retraction        : 0.4
variable_petg_retraction_speed  : 30

variable_tpu_offset             : -0.070
variable_tpu_retraction         : 0.1
variable_tpu_retraction_speed   : 20

variable_abs_offset             : -0.070
variable_abs_retraction         : 0.1
variable_abs_retraction_speed   : 20

variable_asa_offset             : -0.110
variable_asa_retraction         : 0.2
variable_asa_retraction_speed   : 20

gcode:

[gcode_macro SET_MATERIAL]
gcode:
  {% set material = printer["gcode_macro _CUSTOM_VARIABLES"].material %}

  {% if material|lower == "pla" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].pla_offset %}
    {% set retraction = printer["gcode_macro _CUSTOM_VARIABLES"].pla_retraction %}
    {% set speed = printer["gcode_macro _CUSTOM_VARIABLES"].pla_retraction_speed %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}. Retraction amount to {retraction}. Retraction speed to {speed}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    SET_RETRACTION
    
  {% elif material|lower == "petg" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].petg_offset %}
    {% set retraction = printer["gcode_macro _CUSTOM_VARIABLES"].petg_retraction %}
    {% set speed = printer["gcode_macro _CUSTOM_VARIABLES"].petg_retraction_speed %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}. Retraction amount to {retraction}. Retraction speed to {speed}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% elif material|lower == "tpu" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].tpu_offset %}
    {% set retraction = printer["gcode_macro _CUSTOM_VARIABLES"].tpu_retraction %}
    {% set speed = printer["gcode_macro _CUSTOM_VARIABLES"].tpu_retraction_speed %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}. Retraction amount to {retraction}. Retraction speed to {speed}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% elif material|lower == "abs" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].abs_offset %}
    {% set retraction = printer["gcode_macro _CUSTOM_VARIABLES"].abs_retraction %}
    {% set speed = printer["gcode_macro _CUSTOM_VARIABLES"].abs_retraction_speed %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}. Retraction amount to {retraction}. Retraction speed to {speed}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% elif material|lower == "asa" %}
    {% set offset = printer["gcode_macro _CUSTOM_VARIABLES"].asa_offset %}
    {% set retraction = printer["gcode_macro _CUSTOM_VARIABLES"].asa_retraction %}
    {% set speed = printer["gcode_macro _CUSTOM_VARIABLES"].asa_retraction_speed %}
    M118 Filament material is {material}. Setting Z-Offset to {offset}. Retraction amount to {retraction}. Retraction speed to {speed}
    SET_GCODE_OFFSET Z={offset} MOVE=1
    
  {% else %}
    M118 No material set
    
  {% endif %}
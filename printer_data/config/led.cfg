############################
#----------CHAMBER----------
############################

[output_pin Daylight]
pin: PB10
pwm: True
value: 0.00
shutdown_value: 0
cycle_time: 0.01

[gcode_macro DAYLIGHT_ON]
description: Daylight On
gcode:
  SET_PIN PIN=Daylight VALUE=1.00

[gcode_macro DAYLIGHT_OFF]
description: Daylight Off
gcode:
  SET_PIN PIN=Daylight VALUE=0.00

[gcode_macro DAYLIGHT_IDLE]
description: Daylight Idle
gcode:
  SET_PIN PIN=Daylight VALUE=0.01

#############################
#----------TOOLHEAD----------
#############################

[neopixel Toolhead_LED]
pin: EBB36: PD3
chain_count: 3

[led_effect Toolhead_LED_Idle]
autostart:              true
frame_rate:             24
leds:
    neopixel:Toolhead_LED
layers:
    breathing  8 0 screen (0.5, 0.0, 0.0)

[led_effect Toolhead_LED_Homing]
autostart:              true
frame_rate:             24
endstops: stepper_x, stepper_y, stepper_z
leds:
    neopixel:Toolhead_LED
layers:
    homing     3 0 screen (1.0, 1.0, 1.0)

[led_effect Toolhead_LED_Preprinting]
autostart:              true
frame_rate:             24
leds:
    neopixel:Toolhead_LED
layers:
    static     1 0 top (0.0, 0.0, 1.0)

[led_effect Toolhead_LED_Printing]
autostart:              false
leds:
    neopixel:Toolhead_LED
layers:
    static     1 0 top (1.0, 1.0, 1.0)